plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "2000"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.2.0"

android {
    namespace "com.btcmorning.btcmarketpro"
    compileSdk 35
    buildToolsVersion "35.0.0"
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    signingConfigs {
        release {
            keyAlias System.getenv("CM_KEY_ALIAS") ?: ""
            keyPassword System.getenv("CM_KEY_PASSWORD") ?: ""
            storeFile System.getenv("CM_KEYSTORE_PATH") ? file(System.getenv("CM_KEYSTORE_PATH")) : null
            storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: ""
        }
    }

    defaultConfig {
        applicationId "com.btcmorning.btcmarketpro"
        minSdk 21
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    splits {
        abi {
            enable false
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.work:work-runtime-ktx:2.9.1"
}