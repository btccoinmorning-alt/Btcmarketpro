workflows:
  android-release:
    name: BTCMarketPro Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.29.3
      java: 17
      android_signing:
        - btcmarketpro_keystore

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter Kontrolü
        script: |
          flutter --version
          flutter doctor -v

      - name: Paketleri Yükle
        script: flutter pub get

      - name: Splash Screen Oluştur
        script: |
          cd $CM_BUILD_DIR
          dart run flutter_native_splash:create

      - name: Uygulama İkonları Oluştur
        script: |
          cd $CM_BUILD_DIR
          pip3 install Pillow
          python3 - << 'EOF'
          import os, sys
          from PIL import Image

          build_dir = os.environ.get("CM_BUILD_DIR", ".")
          logo_path = os.path.join(build_dir, "assets/logo.png")

          if not os.path.exists(logo_path):
              print("ERROR: logo.png bulunamadı!")
              sys.exit(1)

          sizes = {
              "mipmap-mdpi":     48,
              "mipmap-hdpi":     72,
              "mipmap-xhdpi":    96,
              "mipmap-xxhdpi":  144,
              "mipmap-xxxhdpi": 192,
          }

          logo = Image.open(logo_path).convert("RGBA")
          bbox = logo.getbbox()
          if bbox:
              logo = logo.crop(bbox)

          for folder, size in sizes.items():
              path = os.path.join(build_dir, f"android/app/src/main/res/{folder}")
              os.makedirs(path, exist_ok=True)
              icon = logo.resize((size, size), Image.LANCZOS)
              icon.save(f"{path}/ic_launcher.png")
              icon.save(f"{path}/ic_launcher_round.png")
              print(f"✓ {folder}: {size}x{size}")
          EOF

      - name: local.properties Ayarla
        script: |
          VERSION_CODE=$((2025 + BUILD_NUMBER))
          echo "flutter.sdk=$FLUTTER_ROOT"              > $CM_BUILD_DIR/android/local.properties
          echo "flutter.versionCode=$VERSION_CODE"     >> $CM_BUILD_DIR/android/local.properties
          echo "flutter.versionName=1.3.$BUILD_NUMBER" >> $CM_BUILD_DIR/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"             >> $CM_BUILD_DIR/android/local.properties
          cat $CM_BUILD_DIR/android/local.properties

      - name: İmza Kontrolü ve key.properties Oluştur
        script: |
          echo "Keystore path: $CM_KEYSTORE_PATH"
          echo "Key alias: $CM_KEY_ALIAS"
          ls -la "$CM_KEYSTORE_PATH" || { echo "HATA: Keystore bulunamadı!"; exit 1; }

          keytool -list -v \
            -keystore "$CM_KEYSTORE_PATH" \
            -storepass "$CM_KEYSTORE_PASSWORD" 2>&1 | grep SHA1

          cat > $CM_BUILD_DIR/android/key.properties << KEYEOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          KEYEOF
          echo "✓ key.properties oluşturuldu"

      - name: AAB ve APK Derle
        script: |
          cd $CM_BUILD_DIR
          mkdir -p output
          VERSION_CODE=$((2025 + BUILD_NUMBER))

          flutter build appbundle \
            --release \
            --build-name=1.3.$BUILD_NUMBER \
            --build-number=$VERSION_CODE \
            --no-tree-shake-icons

          AAB="/Users/builder/clone/android/app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB" ]; then
            echo "HATA: AAB bulunamadı!"
            exit 1
          fi
          cp "$AAB" $CM_BUILD_DIR/output/app-release.aab
          echo "✓ AAB hazır"

          flutter build apk \
            --release \
            --build-name=1.3.$BUILD_NUMBER \
            --build-number=$VERSION_CODE \
            --no-tree-shake-icons

          APK="/Users/builder/clone/android/app/build/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "HATA: APK bulunamadı!"
            exit 1
          fi
          cp "$APK" $CM_BUILD_DIR/output/app-release.apk
          echo "✓ APK hazır"

      - name: Build Özeti
        script: |
          VERSION_CODE=$((2025 + BUILD_NUMBER))
          echo "================================"
          echo "  BTCMarketPro Build Tamamlandı"
          echo "================================"
          echo "Version : 1.3.$BUILD_NUMBER ($VERSION_CODE)"
          echo "Branch  : $CM_BRANCH"
          echo "================================"
          ls -lh $CM_BUILD_DIR/output/

    artifacts:
      - output/app-release.aab
      - output/app-release.apk

    publishing:
      email:
        recipients:
          - airdroptour@gmail.com
        notify:
          success: true
          failure: true